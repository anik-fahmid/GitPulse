name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swiftc --version && sw_vers

      - name: Build app + dmg
        run: ./build.sh

      - name: Publish release with dmg
        uses: softprops/action-gh-release@v2
        with:
          name: GitPulse ${{ github.ref_name }}
          files: GitPulse.dmg
          generate_release_notes: true
